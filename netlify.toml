# Netlify Configuration for Suchana Chhattisgarh News Portal
# Static HTML Site — No build required

[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://images.unsplash.com https://api.whatsapp.com https://t.me https://www.facebook.com; connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://api.imgbb.com; img-src * data: blob:;"

# Cache static assets
[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
    [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
    [headers.values]
    Cache-Control = "public, max-age=86400"

# Netlify Forms configuration
[forms]
  "citizen-reporter" = { redirect = "/index.html" }
